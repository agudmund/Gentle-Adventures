# Gentle Adventures — local settings for the NPU adventure
# Live theme/window values live here. The Gemini API key is resolved at
# runtime from environment variables (GEMINI_API_KEY or
# SingleSharedBraincell_GeminiKey) — never written to this file.

[window]
title = "Gentle Adventures"
width = 960
height = 1080

[gemini]
# Active model for live scene image generation.
# Swap if Google renames the model — keep the path syntax.
# gemini-2.5-flash-image is the latency+stability pick for this live loop
# (~6s, ~1.4MB crisp PNG). The "-preview" alias 404s now — use the bare name.
model = "gemini-2.5-flash-image"

[llm]
# Swappable text backend for the ship's voice (Hardware Oracle, vibe weather,
# ghost-repair, sandbox missions). Claude leads for its reasoning; flip
# text_backend to "gemini" to swap on demand. This is SEPARATE from the image
# model above. Keys resolve from the environment (SingleSharedBraincell_ApiKey
# for Claude; the Gemini key as noted) — never written here.
text_backend = "claude"
claude_model = "claude-opus-4-8"
gemini_model = "gemini-3.5-flash"

[paths]
scenes_dir = "Images/Scenes"

[hyworld]
# The orbital twin — the captain's own GPU machine on AWS (the HY-World
# narrative's second light in orbit). Woken in-game through the aws CLI;
# an empty instance_id means the twin is unconfigured on this machine and
# the scene simply plays its asleep face (contextual absence).
instance_id = "i-0c651442d11880187"
profile = "penelope"
region = "us-east-1"

[game]
# Persisted resume point — the launcher reads this on startup.
last_scene = ""
